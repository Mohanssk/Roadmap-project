<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Roadmap & Mentor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for aesthetic */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        .node-line::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            width: 2px;
            height: 24px;
            background-color: #3b82f6;
            transform: translateX(-50%);
        }
        .node-item:last-child .node-line::after { display: none; }
        
        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex overflow-hidden font-sans">

    <!-- Sidebar: Skills -->
    <aside class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col hidden md:flex">
        <div class="p-6 border-b border-gray-700">
            <h1 class="text-xl font-bold text-blue-400">Roadmap AI</h1>
            <p class="text-xs text-gray-400 mt-1">Select a career path</p>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-2" id="skills-list">
            <!-- Skills populated by JS -->
            <div class="text-gray-500 text-sm text-center mt-4">Loading skills...</div>
        </div>
    </aside>

    <!-- Main Content: Roadmap -->
    <main class="flex-1 flex flex-col relative">
        <header class="p-6 border-b border-gray-800 bg-gray-900/90 backdrop-blur z-10 flex justify-between items-center">
            <h2 class="text-2xl font-semibold capitalize" id="current-skill-title">Welcome</h2>
            <button class="md:hidden bg-gray-800 p-2 rounded" onclick="alert('Use a desktop screen for the best experience!')">☰</button>
        </header>

        <div class="flex-1 overflow-y-auto p-8 relative">
            <div id="roadmap-container" class="max-w-md mx-auto flex flex-col items-center space-y-6 pb-20">
                <p class="text-gray-500 text-center mt-10">Select a skill from the sidebar to generate your roadmap.</p>
            </div>
        </div>
    </main>

    <!-- Right Panel: Info & Chat -->
    <aside class="w-80 bg-gray-800 border-l border-gray-700 flex flex-col shadow-2xl z-20 transition-transform duration-300 transform translate-x-full absolute right-0 h-full md:relative md:translate-x-0" id="info-panel">
        
        <!-- Node Info Section -->
        <div class="flex-1 overflow-y-auto p-6 border-b border-gray-700 flex flex-col">
            <h3 class="text-lg font-bold text-blue-400 mb-2" id="node-title">Topic Info</h3>
            
            <div id="node-explain-content" class="text-sm text-gray-300 space-y-4 mb-6">
                <p class="text-gray-500 italic">Click a node on the roadmap to learn more.</p>
            </div>

            <h4 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-2 hidden" id="cert-header">Free Certifications</h4>
            <ul id="node-certs-list" class="space-y-2 text-sm"></ul>
        </div>

        <!-- Chat Section -->
        <div class="h-64 flex flex-col bg-gray-850">
            <div class="p-3 border-b border-gray-700 bg-gray-800 flex justify-between items-center">
                <span class="font-semibold text-sm">AI Mentor</span>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-3 text-sm" id="chat-messages">
                <div class="bg-gray-700 text-gray-200 p-2 rounded-lg rounded-tl-none inline-block max-w-[85%]">
                    Hi! I'm your AI mentor. Ask me anything about your learning journey!
                </div>
            </div>
            <div class="p-3 bg-gray-800 border-t border-gray-700 flex gap-2">
                <input type="text" id="chat-input" class="flex-1 bg-gray-700 border border-gray-600 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500" placeholder="Type a message...">
                <button id="send-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded text-sm transition font-medium">Send</button>
            </div>
        </div>
    </aside>

    <script>
        // API Configuration - Using relative paths for Vercel deployment
        const API_BASE = '/api';

        const dom = {
            skillsList: document.getElementById('skills-list'),
            roadmapContainer: document.getElementById('roadmap-container'),
            skillTitle: document.getElementById('current-skill-title'),
            nodeTitle: document.getElementById('node-title'),
            nodeExplain: document.getElementById('node-explain-content'),
            certHeader: document.getElementById('cert-header'),
            certsList: document.getElementById('node-certs-list'),
            chatMessages: document.getElementById('chat-messages'),
            chatInput: document.getElementById('chat-input'),
            sendBtn: document.getElementById('send-btn'),
            infoPanel: document.getElementById('info-panel')
        };

        // Fetch and display skills on load
        async function fetchSkills() {
            try {
                const res = await fetch(`${API_BASE}/skills`);
                const skills = await res.json();
                dom.skillsList.innerHTML = '';
                skills.forEach(skill => {
                    const btn = document.createElement('button');
                    btn.className = 'w-full text-left px-4 py-2 rounded text-sm text-gray-300 hover:bg-gray-700 hover:text-white transition capitalize';
                    btn.innerText = skill.replace('-', ' ');
                    btn.onclick = () => loadRoadmap(skill);
                    dom.skillsList.appendChild(btn);
                });
            } catch (error) {
                dom.skillsList.innerHTML = '<div class="text-red-400 text-sm">Failed to load skills. Is backend running?</div>';
            }
        }

        // Load specific roadmap
        async function loadRoadmap(skill) {
            dom.skillTitle.innerText = skill.replace('-', ' ');
            dom.roadmapContainer.innerHTML = '<div class="spinner mt-10"></div>';
            
            try {
                const res = await fetch(`${API_BASE}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ skill })
                });
                const data = await res.json();
                
                if(data.error) throw new Error(data.error);

                renderRoadmap(data.roadmap.nodes);
            } catch (err) {
                dom.roadmapContainer.innerHTML = `<p class="text-red-400 mt-10">${err.message}</p>`;
            }
        }

        // Render roadmap nodes visually
        function renderRoadmap(nodes) {
            dom.roadmapContainer.innerHTML = '';
            nodes.forEach((node, index) => {
                const div = document.createElement('div');
                div.className = 'node-item relative w-64';
                
                const btn = document.createElement('button');
                btn.className = 'w-full bg-gray-800 border-2 border-blue-500/50 hover:border-blue-400 hover:shadow-[0_0_15px_rgba(59,130,246,0.3)] text-white font-medium py-3 px-4 rounded-lg transition-all duration-200 z-10 relative';
                btn.innerText = node;
                btn.onclick = () => loadNodeDetails(node);
                
                div.appendChild(btn);
                
                // Add connecting line
                if (index < nodes.length - 1) {
                    const line = document.createElement('div');
                    line.className = 'node-line';
                    div.appendChild(line);
                }
                
                dom.roadmapContainer.appendChild(div);
            });
        }

        // Load explanation and certifications for a clicked node
        async function loadNodeDetails(node) {
            // Show Panel on Mobile
            dom.infoPanel.classList.remove('translate-x-full');

            dom.nodeTitle.innerText = node;
            dom.nodeExplain.innerHTML = '<div class="flex items-center gap-2"><div class="spinner"></div><span>AI is analyzing topic...</span></div>';
            dom.certHeader.classList.add('hidden');
            dom.certsList.innerHTML = '';

            // Fetch Explanation (Async)
            fetch(`${API_BASE}/explain`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ topic: node })
            }).then(r => r.json()).then(data => {
                const formattedText = data.explanation
                    .replace(/\*\*(.*?)\*\*/g, '<strong class="text-white">$1</strong>')
                    .replace(/\n/g, '<br/>');
                dom.nodeExplain.innerHTML = `<div class="leading-relaxed">${formattedText}</div>`;
            }).catch(() => dom.nodeExplain.innerHTML = '<span class="text-red-400">Failed to load explanation.</span>');

            // Fetch Certifications (Async)
            fetch(`${API_BASE}/node-certs`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ node })
            }).then(r => r.json()).then(data => {
                dom.certHeader.classList.remove('hidden');
                dom.certsList.innerHTML = data.certifications.map(cert => `
                    <li>
                        <a href="${cert.url}" target="_blank" class="block p-3 bg-gray-700/50 hover:bg-gray-700 rounded border border-gray-600 hover:border-blue-500 transition text-blue-300 hover:text-blue-200">
                            ${cert.title}
                        </a>
                    </li>
                `).join('');
            });
        }

        // Chat functionality
        async function handleChat() {
            const msg = dom.chatInput.value.trim();
            if (!msg) return;

            // Append User Msg
            dom.chatMessages.innerHTML += `<div class="bg-blue-600 text-white p-2 rounded-lg rounded-tr-none inline-block max-w-[85%] self-end ml-auto mb-3 block">${msg}</div>`;
            dom.chatInput.value = '';
            dom.chatMessages.scrollTop = dom.chatMessages.scrollHeight;

            // Loading indicator
            const loadingId = 'loading-' + Date.now();
            dom.chatMessages.innerHTML += `<div id="${loadingId}" class="bg-gray-700 text-gray-200 p-2 rounded-lg rounded-tl-none inline-block max-w-[85%] mb-3 block"><div class="spinner"></div></div>`;
            dom.chatMessages.scrollTop = dom.chatMessages.scrollHeight;

            try {
                const res = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: msg })
                });
                const data = await res.json();
                
                document.getElementById(loadingId).remove();
                
                const reply = data.reply.replace(/\n/g, '<br/>');
                dom.chatMessages.innerHTML += `<div class="bg-gray-700 text-gray-200 p-2 rounded-lg rounded-tl-none inline-block max-w-[85%] mb-3 block">${reply}</div>`;
            } catch (err) {
                document.getElementById(loadingId).remove();
                dom.chatMessages.innerHTML += `<div class="bg-red-900/50 border border-red-500 text-red-200 p-2 rounded-lg rounded-tl-none inline-block max-w-[85%] mb-3 block">Connection error.</div>`;
            }
            dom.chatMessages.scrollTop = dom.chatMessages.scrollHeight;
        }

        dom.sendBtn.onclick = handleChat;
        dom.chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleChat(); });

        // Init
        fetchSkills();
    </script>
</body>
</html>
